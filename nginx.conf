# ═══════════════════════════════════════════════════════════════════════
# Nginx — Satu Data Singkawang (dua subdomain)
#   satudata.singkawangkota.go.id  → Next.js portal (publik)
#   data.singkawangkota.go.id      → CKAN backend (admin + API)
#
# Pemisahan subdomain menghilangkan tabrakan path asset antara CKAN & portal.
# Standar: BSSN, OWASP, Mozilla SSL "Intermediate", NIST SP 800-52 Rev 2.
# ═══════════════════════════════════════════════════════════════════════

server_tokens off;

# ── Rate limiting ────────────────────────────────────────────────────────
limit_req_zone  $binary_remote_addr  zone=umum:10m   rate=30r/s;
limit_req_zone  $binary_remote_addr  zone=api:10m    rate=10r/s;
limit_req_zone  $binary_remote_addr  zone=login:10m  rate=5r/m;   # anti brute-force
limit_conn_zone $binary_remote_addr  zone=koneksi:10m;

# ── Upstreams ──────────────────────────────────────────────────────────────
upstream portal {
    server portal:3000;
    keepalive 32;
}
upstream ckan {
    server BACKEND_IP:5000;   # ← CKAN existing (sesuaikan port jika beda)
    keepalive 16;
}

# ── Snippet TLS bersama (dipanggil di tiap server block) ──────────────────
# (Nginx tidak punya "include inline", jadi parameter SSL ditulis di tiap blok)

# ═══════════════════════════════════════════════════════════════════════
# HTTP → HTTPS untuk KEDUA subdomain
# ═══════════════════════════════════════════════════════════════════════
server {
    listen 80;
    listen [::]:80;
    server_name satudata.singkawangkota.go.id data.singkawangkota.go.id;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options        "SAMEORIGIN" always;
    return 301 https://$host$request_uri;
}

# ═══════════════════════════════════════════════════════════════════════
# SUBDOMAIN 1 — Portal publik (Next.js)
# ═══════════════════════════════════════════════════════════════════════
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name satudata.singkawangkota.go.id;

    ssl_certificate     /etc/ssl/certs/server.crt;
    ssl_certificate_key /etc/ssl/private/server.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;
    ssl_stapling        on;
    ssl_stapling_verify on;
    resolver            8.8.8.8 8.8.4.4 valid=300s;
    resolver_timeout    5s;

    # ── Security headers ──
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options           "SAMEORIGIN" always;
    add_header X-Content-Type-Options    "nosniff" always;
    add_header X-XSS-Protection          "1; mode=block" always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy        "geolocation=(), microphone=(), camera=(), payment=(), usb=(), interest-cohort=()" always;
    # CSP portal (diperketat): DuckDB-WASM tidak dipakai (DATA_QUERY='flat'), jadi tanpa
    # unsafe-eval/jsdelivr/blob dan tanpa wildcard img https:. unsafe-inline (script+style)
    # dipertahankan untuk skrip bootstrap Next + skrip anti-flicker tema + inline-style React.
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https://data.singkawangkota.go.id; font-src 'self' data:; connect-src 'self' https://data.singkawangkota.go.id; worker-src 'self'; object-src 'none'; frame-ancestors 'self'; base-uri 'self'; form-action 'self';" always;

    client_max_body_size  16m;
    client_body_timeout   30s;
    client_header_timeout 10s;
    send_timeout          30s;
    keepalive_timeout     65s;
    limit_conn koneksi 50;

    gzip on; gzip_vary on; gzip_comp_level 5; gzip_min_length 1000;
    gzip_types text/plain text/css application/json application/javascript text/xml
               application/xml image/svg+xml application/ld+json text/javascript;

    access_log /var/log/nginx/portal.access.log combined;
    error_log  /var/log/nginx/portal.error.log warn;

    # Blokir file sensitif
    location ~ /\.            { deny all; return 404; }
    location ~* \.(env|log|conf|bak|sql|sh)$ { deny all; return 404; }

    # API Next.js (/api/resource) — hanya GET
    location ~ ^/api/ {
        limit_req zone=api burst=20 nodelay;
        limit_except GET { deny all; }
        proxy_hide_header  X-Powered-By;
        proxy_pass         http://portal;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header   Connection        "";
        proxy_read_timeout 30s;
    }

    # Semua halaman & asset portal
    location / {
        limit_req zone=umum burst=50 nodelay;
        limit_except GET POST HEAD { deny all; }
        proxy_hide_header  X-Powered-By;
        proxy_cookie_flags ~ secure samesite=strict;
        proxy_pass         http://portal;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header   Connection        "";
        proxy_read_timeout 30s;
    }
}

# ═══════════════════════════════════════════════════════════════════════
# SUBDOMAIN 2 — CKAN backend (admin + REST API)
# ═══════════════════════════════════════════════════════════════════════
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name data.singkawangkota.go.id;

    ssl_certificate     /etc/ssl/certs/server.crt;
    ssl_certificate_key /etc/ssl/private/server.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;
    ssl_stapling        on;
    ssl_stapling_verify on;
    resolver            8.8.8.8 8.8.4.4 valid=300s;
    resolver_timeout    5s;

    # ── Security headers (CKAN butuh inline JS/CSS → CSP lebih longgar) ──
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options           "SAMEORIGIN" always;
    add_header X-Content-Type-Options    "nosniff" always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;

    # Upload dataset bisa besar — beri ruang lega untuk admin
    client_max_body_size  512m;
    client_body_timeout   300s;
    send_timeout          300s;
    keepalive_timeout     65s;
    limit_conn koneksi 50;

    gzip on; gzip_vary on; gzip_comp_level 5; gzip_min_length 1000;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml image/svg+xml;

    access_log /var/log/nginx/ckan.access.log combined;
    error_log  /var/log/nginx/ckan.error.log warn;

    # Rate limit ketat khusus halaman login (anti brute-force)
    location = /login {
        limit_req zone=login burst=3 nodelay;
        proxy_pass         http://ckan;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # Seluruh CKAN (halaman, asset /webassets /base /uploads, API /api/3, dll)
    location / {
        limit_req zone=umum burst=40 nodelay;
        proxy_pass         http://ckan;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;   # ← CKAN generate URL https
        proxy_read_timeout 300s;
    }
}

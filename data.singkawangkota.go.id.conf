proxy_cache_path /www/wwwroot/data.singkawangkota.go.id/proxy_cache_dir levels=1:2 keys_zone=data_singkawangkota_go_id_cache:20m inactive=1d max_size=5g;

server {
    listen 80;
    
    listen 443 quic;
    listen 443 ssl;
    listen [::]:80;
    
    listen [::]:443 quic;
    listen [::]:443 ssl ;
    
    http2 on;
    server_name data.singkawangkota.go.id;
    index index.php index.html index.htm default.php default.htm default.html;
    root /www/wwwroot/data.singkawangkota.go.id;
    include /www/server/panel/vhost/nginx/extension/data.singkawangkota.go.id/*.conf;

    #CERT-APPLY-CHECK--START
    # Configuration related to file verification for SSL certificate application - Do not delete
    include /www/server/panel/vhost/nginx/well-known/data.singkawangkota.go.id.conf;
    #CERT-APPLY-CHECK--END

    #SSL-START SSL related configuration, do NOT delete or modify the next line of commented-out 404 rules
    #error_page 404/404.html;
    #HTTP_TO_HTTPS_START
    if ($server_port !~ 443){
        rewrite ^(/.*)$ https://$host$1 permanent;
    }
    #HTTP_TO_HTTPS_END
    ssl_certificate    /www/server/panel/vhost/cert/data.singkawangkota.go.id/fullchain.pem;
    ssl_certificate_key    /www/server/panel/vhost/cert/data.singkawangkota.go.id/privkey.pem;
    ssl_protocols TLSv1.1 TLSv1.2 TLSv1.3;
    ssl_ciphers EECDH+CHACHA20:EECDH+CHACHA20-draft:EECDH+AES128:RSA+AES128:EECDH+AES256:RSA+AES256:EECDH+3DES:RSA+3DES:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    add_header Strict-Transport-Security "max-age=31536000";
    error_page 497  https://$host$request_uri;
    #SSL-END
    #REDIRECT START
    
    #REDIRECT END

    #ERROR-PAGE-START  Error page configuration, allowed to be commented, deleted or modified
    #error_page 404 /404.html;
    #error_page 502 /502.html;
    #ERROR-PAGE-END

    #PHP-INFO-START  PHP reference configuration, can be annotated or modified
    
    include enable-php-00.conf;
    #PHP-INFO-END

    #IP-RESTRICT-START Restrict access to IP configuration, IP blacklist and whitelist
    
    
    #IP-RESTRICT-END

    #BASICAUTH START
    
    #BASICAUTH END

    #SUB_FILTER START
    
    #SUB_FILTER END

    #GZIP START
    
    #GZIP END

    #GLOBAL-CACHE START
    
    #GLOBAL-CACHE END

    #WEBSOCKET-SUPPORT START
    proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
    #WEBSOCKET-SUPPORT END

    #PROXY-CONF-START
    location ^~ / {
      
      
      proxy_pass http://BACKEND_IP:5000;
      proxy_set_header Host $http_host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Real-Port $remote_port;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header REMOTE-HOST $remote_addr;
      
      proxy_connect_timeout 60s;
    proxy_send_timeout 600s;
    proxy_read_timeout 600s;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
      
      
      
      
      
    }
    
    #PROXY-CONF-END

    #SERVER-BLOCK START
    # All server fields such as server | location can be set, such as:
# location /web {
#     try_files $uri $uri/ /index.php$is_args$args;
# }
# error_page 404 /diy_404.html;
# If there is abnormal access to the reverse proxy website and the content has already been configured here, please prioritize checking if the configuration here is correct

# === Hardening edge CKAN ===
proxy_hide_header Strict-Transport-Security;
proxy_hide_header X-Content-Type-Options;
proxy_hide_header X-Frame-Options;
proxy_hide_header Referrer-Policy;
add_header X-Content-Type-Options "nosniff" always;
add_header X-Frame-Options        "SAMEORIGIN" always;
add_header Referrer-Policy        "strict-origin-when-cross-origin" always;

# CSP versi CKAN (longgar: admin UI butuh inline script/style + eval + tile peta eksternal).
# UJI admin UI setelah pasang; bila rusak -> longgarkan/hapus baris ini lalu reload.
proxy_hide_header Content-Security-Policy;
add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self' https:; frame-ancestors 'self'; base-uri 'self'; object-src 'none';" always;

# Cookie CKAN (ckan/auth_tkt) -> Secure + SameSite=Lax (Lax WAJIB agar login/redirect jalan).
proxy_cookie_flags ~ secure samesite=lax;

# Cegah kebocoran IP backend pada redirect CKAN.
proxy_redirect http://BACKEND_IP:5000/  https://$host/;
proxy_redirect https://BACKEND_IP:5000/ https://$host/;
proxy_hide_header X-Powered-By;
#END
    #SERVER-BLOCK END

    #Prohibited access to files or directories
    location ~ ^/(\.user.ini|\.htaccess|\.git|\.env|\.svn|\.project|LICENSE|README.md)
    {
        return 404;
    }

    #One click application for SSL certificate verification directory related settings
    location /.well-known{
        allow all;
        root /www/wwwroot/data.singkawangkota.go.id;
    }

    #Prohibit placing sensitive files in the certificate verification directory
    if ( $uri ~ "^/\.well-known/.*\.(php|jsp|py|js|css|lua|ts|go|zip|tar\.gz|rar|7z|sql|bak)$" ) {
        return 403;
    }

    #LOG START
    access_log  /www/wwwlogs/data.singkawangkota.go.id.log;
    error_log  /www/wwwlogs/data.singkawangkota.go.id.error.log;
    #LOG END

    #Monitor-Config-Start Website monitoring report log sending configuration
    access_log syslog:server=unix:/tmp/bt-monitor.sock,nohostname,tag=80__access monitor;
    error_log syslog:server=unix:/tmp/bt-monitor.sock,nohostname,tag=80__error;
    #Monitor-Config-End
}